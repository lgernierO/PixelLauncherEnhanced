name: Build Fork Release APK

on:
  push:
    branches: [ "master", "fix/**", "release/**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Use default debug signing
        run: rm -f keystore.properties

      - name: Get application version name
        run: echo "VERSION_NAME=$(${{ github.workspace }}/gradlew -q printVersionName)" >> "$GITHUB_ENV"

      - name: Build with Gradle
        run: ./gradlew assembleRelease -PversionNameSuffix=" Release${{ github.run_number }}"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: "PLEnhanced v${{ env.VERSION_NAME }} Release${{ github.run_number }}"
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
